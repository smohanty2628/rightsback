<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rights Back - Reclaim Your Music Rights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a18;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container { 
            width: 100%; 
            max-width: 1000px; 
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #f5f0e8;
            font-weight: 700;
        }
        .header p {
            font-size: 18px;
            color: #ccc;
            font-weight: 400;
        }
        .video-section {
            margin-bottom: 30px;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(29, 78, 216, 0.3);
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }
        .cta-section {
            margin-top: 24px;
            display: flex;
            justify-content: center;
        }
        .cta-button {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 15px 40px rgba(29, 78, 216, 0.5);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .cta-button:hover {
            background: linear-gradient(135deg, #1e40af, #1c3fa0);
            transform: translateY(-2px);
            box-shadow: 0 20px 60px rgba(29, 78, 216, 0.7);
        }
        .cta-button:active {
            transform: translateY(0);
        }
        .description {
            text-align: center;
            color: #aaa;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 36px; }
            .header p { font-size: 16px; }
            .cta-button { 
                font-size: 16px; 
                padding: 14px 36px; 
            }
            .description { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Rights Back®</h1>
        <p>Reclaim Your Music Rights</p>
    </div>
    
    <div class="video-section">
        <div class="video-wrapper">
            <!-- YouTube Video - Video ID: I8wR1dP6aQY -->
            <iframe 
                src="https://www.youtube.com/embed/I8wR1dP6aQY?rel=0&modestbranding=1" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
        
        <!-- CTA Button Below Video -->
        <div class="cta-section">
            <a href="https://www.rightsback.net/" class="cta-button" target="_blank" rel="noopener noreferrer">
                Start Free Analysis →
            </a>
        </div>
        
        <!-- Description Text -->
        <div class="description">
            Get instant eligibility results for reclaiming your music rights under U.S. copyright law.
        </div>
    </div>
</div>

</body>
</html>
